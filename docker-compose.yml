version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chatapp_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-chatapp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme123}
      POSTGRES_DB: ${POSTGRES_DB:-chatapp_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-chatapp_user} -d ${POSTGRES_DB:-chatapp_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatapp_network

  redis:
    image: redis:7-alpine
    container_name: chatapp_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chatapp_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatapp_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - chatapp_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatapp_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - chatapp_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  chatapp_network:
    driver: bridge
